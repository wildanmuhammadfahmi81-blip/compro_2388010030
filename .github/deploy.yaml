name: Deploy Next.js to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_WILDANMFAHMI123 }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_WILDANMFAHMI123 }}/compro_2388010030:latest

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          script: |
            docker rm -f compro_2388010030 || true
            docker pull ${{ secrets.DOCKERHUB_WILDANMFAHMI123 }}/compro_2388010030:latest
            docker run -d \
              --name compro_2388010030 \
              -p 80:80 \
              ${{ secrets.DOCKERHUB_WILDANMFAHMI123 }}/compro_2388010030:latest
