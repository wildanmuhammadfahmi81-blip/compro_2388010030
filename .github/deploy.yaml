name: Deploy Next.js to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_wildanmfahmi123 }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_wildanmfahmi123 }}/compro_238800030:latest

      - name: Deploy to EC2 via SSH and run Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          port: 22
          script: |
            docker rm -f compro_238800030 || true
            docker pull ${{ secrets.DOCKERHUB_wildanmfahmi123 }}/compro_238800030:latest
            docker run -d \
              --name compro_238800030 \
              -p 80:80 \
              ${{ secrets.DOCKERHUB_wildanmfahmi123 }}/compro_238800030:latest